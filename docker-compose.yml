services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opspilot}
      POSTGRES_USER: ${POSTGRES_USER:-opspilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opspilot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opspilot} -d ${POSTGRES_DB:-opspilot}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    image: alpine:3.20
    profiles: ["apps"]
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

  api-gateway:
    image: alpine:3.20
    profiles: ["apps"]
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"

  auth-service:
    image: alpine:3.20
    profiles: ["apps"]
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"

  tenant-service:
    image: alpine:3.20
    profiles: ["apps"]
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    ports:
      - "${TENANT_SERVICE_PORT:-8082}:8082"

  knowledge-base-service:
    image: alpine:3.20
    profiles: ["apps"]
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    ports:
      - "${KNOWLEDGE_BASE_SERVICE_PORT:-8083}:8083"

  ai-orchestrator-service:
    image: alpine:3.20
    profiles: ["apps"]
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    ports:
      - "${AI_ORCHESTRATOR_SERVICE_PORT:-8084}:8084"

  ticket-service:
    image: alpine:3.20
    profiles: ["apps"]
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    ports:
      - "${TICKET_SERVICE_PORT:-8085}:8085"

  notification-service:
    image: alpine:3.20
    profiles: ["apps"]
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8086}:8086"

  analytics-service:
    image: alpine:3.20
    profiles: ["apps"]
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    ports:
      - "${ANALYTICS_SERVICE_PORT:-8087}:8087"

volumes:
  postgres_data:
  minio_data:
