spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:opspilot}?currentSchema=auth
    username: ${POSTGRES_USER:opspilot}
    password: ${POSTGRES_PASSWORD:opspilot}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: auth
    open-in-view: false
  flyway:
    enabled: true
    default-schema: auth
    schemas: auth

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info

auth:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-secret-for-local-dev-only}
    issuer: opspilot-auth-service
    access-token-ttl: PT15M
    refresh-token-ttl: P14D
  service-token: ${INTERNAL_SERVICE_TOKEN:opspilot-internal-dev-token}

tenant-service:
  base-url: ${TENANT_SERVICE_BASE_URL:http://localhost:8082}
