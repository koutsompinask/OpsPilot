spring:
  datasource:
    url: "jdbc:h2:mem:authdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS auth\\;SET SCHEMA auth"
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: auth
    open-in-view: false
  flyway:
    enabled: false

auth:
  jwt:
    secret: test-secret-test-secret-test-secret-123456
    issuer: opspilot-auth-service
    access-token-ttl: PT15M
    refresh-token-ttl: P14D
  service-token: test-service-token

tenant-service:
  base-url: http://localhost:8082
