spring:
  application:
    name: ai-orchestrator-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:opspilot}?currentSchema=knowledge
    username: ${POSTGRES_USER:opspilot}
    password: ${POSTGRES_PASSWORD:opspilot}
  security:
    oauth2:
      resourceserver:
        jwt:
          secret: ${JWT_SECRET:change-me-to-a-long-secret-for-local-dev-only}

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info

ai:
  chat:
    default-top-k: ${AI_CHAT_DEFAULT_TOP_K:4}
    low-confidence-threshold: ${AI_CHAT_LOW_CONFIDENCE_THRESHOLD:0.55}
  embedding:
    provider: ${AI_EMBEDDING_PROVIDER:${KNOWLEDGE_EMBEDDING_PROVIDER:local}}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
      url: ${OPENAI_EMBEDDING_URL:https://api.openai.com/v1/embeddings}
  answer:
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
      url: ${OPENAI_CHAT_URL:https://api.openai.com/v1/chat/completions}
