spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**
        - id: tenant-service
          uri: ${TENANT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/tenants/**,/users/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

gateway:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-secret-for-local-dev-only}
