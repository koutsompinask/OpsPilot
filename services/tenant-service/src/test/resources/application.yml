spring:
  datasource:
    url: "jdbc:h2:mem:tenantdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS tenant\\;SET SCHEMA tenant"
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: tenant
    open-in-view: false
  flyway:
    enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          secret: test-secret-test-secret-test-secret-123456

tenant:
  service-token: test-service-token

auth-service:
  base-url: http://localhost:8081
